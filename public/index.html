<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Apex Sessions</title>
<meta name="description" content="Apex Sessions — video, audio, and screen-share calls with live chat and host controls." />
<link rel="icon" href="data:," />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<div class="summit-glow" aria-hidden="true"></div>

<main id="view-landing" class="view view-landing">
  <header class="brand">
    <span class="brand-mark" aria-hidden="true"></span>
    <span class="brand-name">Apex Sessions</span>
  </header>

  <section class="landing-hero">
    <p class="hero-eyebrow">Live · Peer-to-peer · Private</p>
    <h1 class="hero-title">Get everyone to the<br /><span class="hero-title-accent">same summit.</span></h1>
    <p class="hero-sub">Camera, screen, or just your voice — one room, no app to install.</p>
  </section>

  <section class="entry-card" aria-label="Join or start a session">
    <div class="field">
      <label for="display-name">Your name</label>
      <input id="display-name" type="text" maxlength="40" placeholder="e.g. Jordan" autocomplete="name" />
    </div>

    <div class="entry-tabs" role="tablist" aria-label="Choose how to enter">
      <button class="entry-tab is-active" data-tab="create" role="tab" aria-selected="true">Start a session</button>
      <button class="entry-tab" data-tab="join" role="tab" aria-selected="false">Join a session</button>
    </div>

    <div class="entry-panel" data-panel="create">
      <p class="entry-hint">You'll get a session code to share with anyone you want to join.</p>
      <button id="btn-create" class="btn btn-primary">Create session</button>
    </div>

    <div class="entry-panel" data-panel="join" hidden>
      <div class="field">
        <label for="room-code">Session code</label>
        <input id="room-code" type="text" maxlength="40" placeholder="e.g. ridge-7741" autocomplete="off" />
      </div>
      <button id="btn-join" class="btn btn-primary">Join session</button>
    </div>

    <p id="entry-error" class="entry-error" role="alert" hidden></p>
  </section>

  <section class="precheck" aria-label="Camera and microphone preview">
    <div class="precheck-frame">
      <video id="precheck-video" autoplay playsinline muted></video>
      <div id="precheck-placeholder" class="precheck-placeholder">
        <span class="avatar-ring" aria-hidden="true"></span>
        <p>Camera preview</p>
      </div>
    </div>
    <div class="precheck-controls">
      <button id="precheck-mic" class="toggle-pill is-on" type="button" aria-pressed="true">
        <span class="dot" aria-hidden="true"></span> Mic
      </button>
      <button id="precheck-cam" class="toggle-pill is-on" type="button" aria-pressed="true">
        <span class="dot" aria-hidden="true"></span> Camera
      </button>
    </div>
  </section>
</main>

<script src="/js/landing.js"></script>
</body>
</html>
